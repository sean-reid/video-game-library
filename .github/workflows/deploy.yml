name: Deploy

# Production deploys only fire from the upstream repo's main branch — never
# from forks or the modernization branch. The two jobs are independent: the
# Pages job ships the web app, the worker job ships the Cloudflare worker.
# Each gates on its own path so an unrelated push doesn't redeploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pages:
    name: Build and deploy to GitHub Pages
    if: github.repository == 'Danrstaton/video-game-library'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vgl/web build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist
      - id: deploy
        uses: actions/deploy-pages@v4

  worker:
    name: Deploy Cloudflare worker (prod)
    if: github.repository == 'Danrstaton/video-game-library'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Wrangler deploy --env prod
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/worker
          command: deploy --env prod
